# ==========================================================
# dbt_project.yml
# Canadian Analytics Engineering Project
# Run: dbt run | dbt test | dbt docs generate
# ==========================================================

name: 'canadian_analytics'
version: '1.0.0'
config-version: 2

# Your dbt profile (matches profiles.yml)
profile: 'canadian_analytics'

# File paths
model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations by folder
models:
  canadian_analytics:

    # Staging: cheap views — rebuilt on every run
    staging:
      +materialized: view
      +schema: staging

    # Intermediate: tables — computed once, referenced by marts
    intermediate:
      +materialized: table
      +schema: intermediate

    # Marts: incrementally loaded fact tables + dimension tables
    marts:
      +materialized: table
      +schema: marts

      finance:
        fct_revenue:
          +materialized: incremental
          +unique_key: sale_id

      customers:
        dim_customers_scd2:
          +materialized: table

# Seed (CSV) configurations
seeds:
  canadian_analytics:
    +schema: raw_seeds

# Snapshot configurations (SCD Type 2)
snapshots:
  canadian_analytics:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at
